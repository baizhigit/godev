syntax = "proto3";

package platform.user.v1;

option go_package = "github.com/baizhigit/godev/shared/proto/gen/go/platform/user/v1;userv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";
import "google/api/annotations.proto";
import "buf/validate/validate.proto";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
  }

  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = {
      get: "/v1/users/{id}"
    };
  }

  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {
      get: "/v1/users"
    };
  }

  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (google.api.http) = {
      patch: "/v1/users/{id}"
      body: "*"
    };
  }

  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (google.api.http) = {
      delete: "/v1/users/{id}"
    };
  }
}

message CreateUserRequest {
  string email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.max_len = 254    // RFC 5321 max email length
  ];

  string first_name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 50,
    (buf.validate.field).string.pattern = "^[\\p{L} '-]+$"  // буквы, пробел, дефис, апостроф
  ];

  string last_name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 50,
    (buf.validate.field).string.pattern = "^[\\p{L} '-]+$"
  ];
}

message CreateUserResponse {
  User user = 1 [(buf.validate.field).required = true];
}

message GetUserRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true      // если используешь UUID
  ];
}

message GetUserResponse {
  User user = 1 [(buf.validate.field).required = true];
}

message ListUsersRequest {
  int32 page_size = 1 [
    (buf.validate.field).int32.gte = 1,
    (buf.validate.field).int32.lte = 100         // защита от page_size=999999
  ];

  string page_token = 2 [
    (buf.validate.field).string.max_len = 1024   // токен не может быть бесконечным
  ];
}

message ListUsersResponse {
  repeated User users = 1 [
    (buf.validate.field).repeated.max_items = 100  // соответствует lte выше
  ];

  string next_page_token = 2 [
    (buf.validate.field).string.max_len = 1024
  ];
}

message UpdateUserRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  // FieldMask — клиент явно указывает какие поля обновить
  // PATCH /v1/users/123 { "first_name": "John", "update_mask": "first_name" }
  google.protobuf.FieldMask update_mask = 2 [
    (buf.validate.field).required = true
  ];
  string first_name = 3 [
    (buf.validate.field).string.max_len = 50
  ];
  string last_name = 4 [
    (buf.validate.field).string.max_len = 50
  ];
  string email = 5 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.max_len = 254
  ];
}

message UpdateUserResponse {
  User user = 1 [(buf.validate.field).required = true];
}

message DeleteUserRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}

// Пустой response — стандартная практика для Delete
// НЕ используем google.protobuf.Empty — теряем возможность добавить поля позже
message DeleteUserResponse {}

// ─── Entities ────────────────────────────────────────────────────────────────

message User {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  string email = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.max_len = 254
  ];

  string first_name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 50
  ];

  string last_name = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 50
  ];

  google.protobuf.Timestamp created_at = 5 [
    (buf.validate.field).required = true
  ];

  google.protobuf.Timestamp updated_at = 6 [
    (buf.validate.field).required = true
  ];
}